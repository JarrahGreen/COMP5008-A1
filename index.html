<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignment 1</title>

    <style>
        #canvas {
            background-color: yellow;
        }
        polygon {
            fill: red;
            stroke-width: 1;
            stroke: black;
        }
        .container {
            display: grid;
            grid-template-areas:
                    "up up"
                    "left right"
                    "down down";
        }
        div {
            max-width: 400px;
        }
        div.up {
            grid-area: up;
            justify-self: center;
        }
        div.left {
            grid-area: left;
        }
        div.right {
            grid-area: right;
        }
        div.down {
            grid-area: down;
            justify-self: center;
        }
        .right button {
            float: right;
        }
        .innerCircle {
            stroke: white;
            stroke-width: 2;
        }
    </style>
</head>
<body>

<svg width="400" height="400" id="canvas">
    <g id="carElements">
        <circle r="15" cx="115" cy="160" ></circle>
        <circle class="innerCircle"  r="10" cx="115" cy="160"></circle>

        <circle r="15" cx="190" cy="160" ></circle>
        <circle class="innerCircle" r="10" cx="190" cy="160"></circle>

        <polygon points="
            100,100
            180,100
            195,125
            225,127
            225,160
            85,160
            85,130
        "></polygon>
    </g>


</svg>

<div class="container">
    <div class="up">
        <button onclick="translateY(true)">Translate Up</button>
    </div>
    <div class="left">
        <button onclick="translateX(true)">Translate Left</button>
    </div>
    <div class="right">
        <button id="right" onclick="translateX(false)">Translate Right</button>
    </div>
    <div class="down">
        <button onclick="translateY(false)">Translate Down</button>
    </div>
</div>

<br/>

<label for="rotation">Rotation in Degrees</label>
<input type="number" id="rotation" value="0">
<button onclick="rotateCar()">Rotate</button>

<script>

    let xPosition = 0;
    let yPosition = 0;
    let rotation = 0;
    const carCenterX = (85 + 225) / 2
    const carCenterY = (100 + 175) / 2

    function translateX(left) {
        if (left) {
            xPosition -= 10;
        }
        else {
            xPosition += 10;
        }

        const carElements = document.getElementById("carElements");
        carElements.setAttribute("transform", "translate(" + xPosition + "," + yPosition + ") " +
            "rotate(" + rotation + "," + carCenterX + "," + carCenterY + ")");
    }

    function translateY(up) {
        if (up) {
            yPosition -= 10;
        }
        else {
            yPosition += 10;
        }

        const carElements = document.getElementById("carElements");
        carElements.setAttribute("transform", "translate(" + xPosition + "," + yPosition + ") " +
            "rotate(" + rotation + "," + carCenterX + "," + carCenterY + ")");
    }

    function rotateCar() {
        const carElements = document.getElementById("carElements");
        rotation = document.getElementById("rotation").value;
        carElements.setAttribute("transform", "translate(" + xPosition + "," + yPosition + ") " +
            "rotate(" + rotation + "," + carCenterX + "," + carCenterY + ")");
    }

    
</script>

</body>
</html>
